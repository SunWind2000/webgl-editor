packages:
  - packages/*
  - apps/*
  - playground
  - tests/*
allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
confirmModulesPurge: false
minimumReleaseAgeExclude:
  - '@vitest/expect@4.1.7'
  - '@vitest/mocker@4.1.7'
  - '@vitest/pretty-format@4.1.7'
  - '@vitest/runner@4.1.7'
  - '@vitest/snapshot@4.1.7'
  - '@vitest/spy@4.1.7'
  - '@vitest/utils@4.1.7'
  - '@vue/language-core@3.3.1'
  - vitest@4.1.7
  - vue-tsc@3.3.1
  - '@types/node@26.0.0'
